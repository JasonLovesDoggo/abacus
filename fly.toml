app = "j-abacus"
primary_region = "yyz"

[build]
dockerfile = "Dockerfile"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[metrics]
port = 9091
path = "/metrics"

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/healthcheck"

[[vm]]
memory_mb = 512
cpu_kind = "shared"
cpus = 2

[deploy]
strategy = "bluegreen"
